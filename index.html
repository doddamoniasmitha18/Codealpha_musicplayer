<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Music Player</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

<div class="player" id="player">
  <div class="cover">
    <img id="cover" src="https://images.unsplash.com/photo-1611339555312-e607c8352fd7?w=600&auto=format&fit=crop" alt="Album cover">
  </div>

  <div class="info">
    <h2 class="title" id="title">Song Title</h2>
    <p class="artist" id="artist">Artist Name</p>
  </div>

  <div class="progress-container">
    <div class="progress-bar" id="progressBar">
      <div class="progress" id="progress"></div>
    </div>
    <div class="time">
      <span id="currentTime">0:00</span>
      <span id="duration">0:00</span>
    </div>
  </div>

  <div class="controls">
    <button class="btn" id="prev">⏮</button>
    <button class="btn play-pause" id="play">▶</button>
    <button class="btn" id="next">⏭</button>
  </div>

  <div class="volume-container">
    <span>🔊</span>
    <div class="volume-bar" id="volumeBar">
      <div class="volume-progress" id="volumeProgress"></div>
    </div>
  </div>

  <div class="playlist" id="playlist"></div>
</div>

<script src="script.js" defer></script>
</body>
</html>
